<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science 4.0 — Interface</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code:wght@400;500&display=swap">
    <style>
        body {
            background-color: #030712;
            color: #e2e8f0;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* COUCHE 1 : Fond en Couleurs d'Origine et Lumineux */
        .bg-video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; 
            overflow: hidden;
            background: #030712;
        }

        .bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85; 
            filter: brightness(1.3) contrast(1.1); 
        }

        /* COUCHE 2 : Voile de protection intermédiaire */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; 
            background: radial-gradient(circle at center, rgba(3,7,18,0.1) 0%, rgba(3,7,18,0.5) 100%);
        }

        /* COUCHE 10 : Contenu au premier plan */
        .container {
            position: relative;
            z-index: 10; 
            max-width: 900px;
            width: 100%;
        }

        header {
            margin-bottom: 50px;
            border-bottom: 1px solid rgba(0, 242, 254, 0.15);
            padding-bottom: 30px;
            position: relative;
        }

        /* Voyant de statut système */
        header::before {
            content: "SYS_STATUS: ACTIVE";
            position: absolute;
            top: -30px;
            left: 0;
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            color: #10b981;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        h1 {
            font-family: 'Fira Code', monospace;
            color: #00f2fe;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
            margin: 0 0 12px 0;
            font-size: 2.8rem;
            font-weight: 500;
        }

        .subtitle {
            color: #38bdf8;
            font-size: 1.15rem;
            margin: 0;
            letter-spacing: 0.5px;
        }

        /* Nœuds de connectivité sécurisés */
        .nav-nodes {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            align-items: center;
        }

        .nav-nodes a {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            letter-spacing: 1px;
            font-weight: 500;
            color: #38bdf8;
            text-decoration: none;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }
