<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Julien Boblique — Science 4.0 & Bio-OS V8</title>
    <meta name="description" content="Site officiel du Dr. Julien Boblique, architecte de la Science 4.0 et du Bio-OS V8. Chercheur publié en souveraineté biologique et résilience systémique.">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='35' stroke='%2300f2fe' stroke-width='6' fill='none' stroke-dasharray='5 3'/><circle cx='50' cy='50' r='12' fill='%2300f2fe'/></svg>">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://julien-science40.github.io/science40/">
    <meta property="og:title" content="Dr. Julien Boblique — Science 4.0 & Bio-OS V8">
    <meta property="og:description" content="Site officiel du Dr. Julien Boblique, architecte de la Science 4.0 et du Bio-OS V8. Chercheur publié en souveraineté biologique et résilience systémique.">
    <meta property="og:image" content="https://julien-science40.github.io/science40/Dr_Julien_Boblique_Portrait.jpg.png">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code:wght@400;500&display=swap">
    <style>
        body {
            background-color: #030712;
            color: #e2e8f0;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 60px 20px 120px 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
            cursor: none; /* Masque le curseur par défaut */
        }

        /* Curseur personnalisé */
        #custom-cursor {
            position: fixed;
            width: 15px;
            height: 15px;
            border: 2px solid #00f2fe;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #00f2fe;
            transition: transform 0.1s ease;
        }

        /* Barre de défilement personnalisée */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #030712; 
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 242, 254, 0.2); 
            border-radius: 3px;
            transition: background 0.3s ease;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 242, 254, 0.6); 
            box-shadow: 0 0 8px rgba(0, 242, 254, 0.5);
        }

        /* COUCHE 1 : Fond Vidéo Multi-pistes avec Crossfade */
        .bg-video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; 
            overflow: hidden;
            background: #030712;
        }

        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0; 
            filter: brightness(1.6) contrast(1.15); 
            transition: opacity 1500ms ease-in-out; 
        }

        .bg-video.active {
            opacity: 0.55; 
        }

        /* COUCHE 2 : Voile de protection */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; 
            background: radial-gradient(circle at center, rgba(3,7,18,0.1) 0%, rgba(3,7,18,0.5) 100%);
            pointer-events: none;
        }

        /* COUCHE 10 : Contenu principal */
        .container {
            position: relative;
            z-index: 10; 
            max-width: 900px;
            width: 100%;
        }

        header {
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(0, 242, 254, 0.15);
            padding-bottom: 30px;
            position: relative;
        }

        #sys-status {
            position: absolute;
            top: -30px;
            left: 0;
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            color: #10b981;
            letter-spacing: 2px;
        }

        .blink-cursor {
            animation: blinkToken 1s infinite step-end;
        }

        h1 {
            font-family: 'Fira Code', monospace;
            color: #00f2fe;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
            margin: 0 0 12px 0;
            font-size: 2.8rem;
            font-weight: 500;
        }

        .subtitle {
            color: #38bdf8;
            font-size: 1.15rem;
            margin: 0 0 16px 0;
            letter-spacing: 0.5px;
        }

        .header-links {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: #4b5563; 
        }

        .header-links a {
            color: #00f2fe;
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            margin: 0 5px;
        }

        .header-links a:hover {
            color: #38bdf8;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.6);
        }

        /* Navigation Cyber-Industrielle */
        .tab-navigation {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 45px;
            justify-content: flex-start;
            font-family: 'Fira Code', monospace;
        }

        .tab-btn {
            background: rgba(11, 18, 32, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 254, 0.25);
            color: rgba(226, 232, 240, 0.6);
            padding: 10px 18px;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            letter-spacing: 0.5px;
        }

        .tab-btn:hover {
            color: #38bdf8;
            border-color: rgba(0, 242, 254, 0.6);
            box-shadow: 0 0 12px rgba(0, 242, 254, 0.15);
        }

        .tab-btn.active {
            color: #00f2fe;
            border-color: #00f2fe;
            background: rgba(0, 242, 254, 0.08);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.25), inset 0 0 5px rgba(0, 242, 254, 0.1);
            font-weight: 500;
        }

        /* ALGORITHME DE PLACEMENT HORS-ÉCRAN */
        .tab-panel {
            display: flex;
            flex-direction: column;
            gap: 35px;
            position: absolute;
            left: -9999px;
            top: 0;
            width: 100%;
            box-sizing: border-box;
            pointer-events: none;
        }

        .tab-panel.active {
            position: relative;
            left: 0;
            top: 0;
            pointer-events: auto;
        }

        .card {
            background: rgba(11, 18, 32, 0.85); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 16px;
            padding: 30px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .card {
                flex-direction: row;
                align-items: flex-start;
            }
            .card-content {
                flex: 1;
            }
            .card-media {
                width: 300px;
                aspect-ratio: 16/9; 
                flex-shrink: 0;
            }
        }

        .card:hover {
            transform: translateY(-5px) scale(1.01);
            border-color: rgba(0, 242, 254, 0.7);
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.25), 
                        inset 0 0 15px rgba(0, 242, 254, 0.1);
        }

        .card-media {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            position: relative;
            background: #020617;
        }

        .display-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .matrix-console {
            background: rgba(2, 6, 17, 0.7);
            border: 1px solid rgba(0, 242, 254, 0.15);
            border-radius: 6px;
            padding: 12px;
            font-family: 'Fira Code', monospace;
            font-size: 0.78rem;
            color: #38bdf8;
            overflow-x: auto;
            margin-top: 15px;
            white-space: pre-wrap; 
            line-height: 1.4;
        }

        .manifesto-timeline {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 15px;
            font-family: 'Fira Code', monospace;
        }

        .manifesto-node {
            border-left: 2px dashed rgba(56, 189, 248, 0.2);
            padding-left: 20px;
            position: relative;
        }

        .manifesto-node::before {
            content: "";
            position: absolute;
            left: -5px;
            top: 5px;
            width: 8px;
            height: 8px;
            background: #4b5563;
            border-radius: 50%;
        }

        .manifesto-node.active {
            border-left: 2px solid #00f2fe;
        }

        .manifesto-node.active::before {
            background: #00f2fe;
            box-shadow: 0 0 10px #00f2fe;
        }

        .manifesto-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .manifesto-node.active .manifesto-title {
            color: #00f2fe;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.3);
        }

        .manifesto-desc {
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 0.9rem;
            color: #94a3b8;
            line-height: 1.5;
        }

        .display-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: rgba(7, 11, 22, 0.6);
            filter: saturate(0.7) brightness(0.85) contrast(1.1);
            mix-blend-mode: luminosity;
            transition: all 0.5s ease;
            display: block;
        }

        .card:hover .display-img {
            filter: saturate(0.9) brightness(0.95);
            mix-blend-mode: normal;
        }

        h2 {
            font-family: 'Fira Code', monospace;
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
            margin: 0 0 12px 0;
            font-size: 1.6rem;
            font-weight: 500;
        }

        p {
            color: #cbd5e1;
            line-height: 1.6;
            margin: 0;
            font-size: 1rem;
        }

        .document-registry {
            margin-top: 25px;
            border-top: 1px dashed rgba(0, 242, 254, 0.2);
            padding-top: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
        }

        .document-registry-title {
            color: #38bdf8;
            margin-bottom: 15px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .document-line {
            margin: 12px 0;
            color: #cbd5e1;
            line-height: 1.5;
        }

        .tag-cyan { color: #00f2fe; font-weight: 600; }
        .tag-green { color: #10b981; font-weight: 600; }
        .tag-orange { color: #f59e0b; font-weight: 600; }

        .document-link {
            color: #cbd5e1;
            text-decoration: none;
            border-bottom: 1px dashed rgba(56, 189, 248, 0.4);
            transition: all 0.3s ease;
        }

        .document-link:hover {
            color: #00f2fe;
            border-bottom-style: solid;
            border-color: #00f2fe;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.5);
        }

        footer {
            position: relative;
            z-index: 10; 
            margin-top: 40px;
            padding-top: 40px;
            color: #cbd5e1; 
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            text-align: center;
            width: 100%;
            letter-spacing: 0.5px;
        }

        @media print {
            body { background: #ffffff !important; color: #000000 !important; padding: 20px !important; }
            .bg-video-container, .bg-overlay, .card-media, iframe, #sys-status, .tab-navigation { display: none !important; }
            .card { background: none !important; border: none !important; box-shadow: none !important; padding: 0 !important; margin-bottom: 30px !important; page-break-inside: avoid; }
        }

        @keyframes blinkToken { from, to { color: transparent; } 50% { color: #10b981; text-shadow: 0 0 8px rgba(16, 185, 129, 0.6); } }
        @keyframes pulseNode { 0% { r: 4; fill: #00f2fe; } 50% { r: 6; fill: #38bdf8; } 100% { r: 4; fill: #00f2fe; } }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>

    <div class="bg-video-container">
        <video id="layer-servers" class="bg-video active" autoplay loop muted playsinline>
            <source src="labo.mp4" type="video/mp4">
        </video>
        <video id="layer-bio" class="bg-video" loop muted playsinline>
            <source src="Macroscopic_journey_through_a.mp4" type="video/mp4">
        </video>
        <video id="layer-math" class="bg-video" loop muted playsinline>
            <source src="Abstract_geometric_simulation.mp4" type="video/mp4">
        </video>
    </div>
    <div class="bg-overlay"></div>

    <div class="container">
        <header>
            <div id="sys-status">SYS_STATUS: INITIALIZING SYSTEM TIME...</div>
            <h1>Science 4.0</h1>
            <p class="subtitle">Framework Architectural pour la Résilience et les Systèmes Structurels</p>
            <div class="header-links">
                [ <a href="https://www.linkedin.com/in/julien-boblique-33230a210" target="_blank">LINKEDIN_NODE</a> ] &nbsp;&nbsp; [ <a href="mailto:julien.boblique@orange.fr">CONTACT_PRO</a> ] &nbsp;&nbsp; [ <a href="https://orcid.org/0009-0009-0648-5970" target="_blank">ORCID_NODE</a> ] &nbsp;&nbsp; [ <a href="https://scholar.google.com/scholar?q=Julien+Boblique" target="_blank">SCHOLAR_NODE</a> ]
            </div>
        </header>

        <nav class="tab-navigation">
            <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">[ MAIN_DASHBOARD ]</button>
            <button class="tab-btn" data-tab="bioos" onclick="switchTab('bioos')">[ BIO-OS_CORE ]</button>
            <button class="tab-btn" data-tab="profile" onclick="switchTab('profile')">[ RESEARCH_NODE ]</button>
        </nav>

        <main>
            <div id="panel-dashboard" class="tab-panel active">
                </div>
            <div id="panel-bioos" class="tab-panel">
                </div>
            <div id="panel-profile" class="tab-panel">
                </div>
        </main>
    </div>

    <script>
        // Curseur personnalisé
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Routage des onglets
        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`panel-${tabId}`).classList.add('active');
            document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
        };

        // Horloge système et autres moteurs (restaurés de votre code original)
        function updateSystemClock() {
            const statusElem = document.getElementById('sys-status');
            if (!statusElem) return;
            const now = new Date();
            statusElem.innerHTML = `SYS_STATUS: ACTIVE // ${String(now.getDate()).padStart(2, '0')}.${String(now.getMonth() + 1).padStart(2, '0')}.${now.getFullYear()} - ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')} <span class="blink-cursor">_</span>`;
        }
        setInterval(updateSystemClock, 1000);
    </script>
</body>
</html>
