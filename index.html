<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Julien Boblique — Science 4.0 & Bio-OS V8</title>
    <meta name="description" content="Site officiel du Dr. Julien Boblique, architecte de la Science 4.0 et du Bio-OS V8. Chercheur publié en souveraineté biologique et résilience systémique.">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='35' stroke='%2300f2fe' stroke-width='6' fill='none' stroke-dasharray='5 3'/><circle cx='50' cy='50' r='12' fill='%2300f2fe'/></svg>">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code:wght@400;500&display=swap">
    <style>
        /* MODULE DE CHARGEMENT INITIAL */
        #loader-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #030712;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        .loader-text {
            font-family: 'Fira Code', monospace;
            color: #00f2fe;
            margin-bottom: 20px;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .progress-bar-container {
            width: 300px;
            height: 2px;
            background: rgba(0, 242, 254, 0.1);
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: #00f2fe;
            box-shadow: 0 0 10px #00f2fe;
        }

        body {
            background-color: #030712;
            color: #e2e8f0;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 60px 20px 120px 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* ... [LE RESTE DE TES STYLES PRÉCÉDENTS RESTE INCHANGÉ] ... */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #030712; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 242, 254, 0.2); border-radius: 3px; }
        .bg-video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; overflow: hidden; background: #030712; }
        .bg-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; filter: brightness(1.6) contrast(1.15); transition: opacity 1500ms ease-in-out; }
        .bg-video.active { opacity: 0.55; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; background: radial-gradient(circle at center, rgba(3,7,18,0.1) 0%, rgba(3,7,18,0.5) 100%); pointer-events: none; }
        .container { position: relative; z-index: 10; max-width: 900px; width: 100%; }
        header { margin-bottom: 40px; border-bottom: 1px solid rgba(0, 242, 254, 0.15); padding-bottom: 30px; position: relative; }
        #sys-status { position: absolute; top: -30px; left: 0; font-family: 'Fira Code', monospace; font-size: 0.75rem; color: #10b981; letter-spacing: 2px; }
        .blink-cursor { animation: blinkToken 1s infinite step-end; }
        h1 { font-family: 'Fira Code', monospace; color: #00f2fe; text-shadow: 0 0 20px rgba(0, 242, 254, 0.5); margin: 0 0 12px 0; font-size: 2.8rem; font-weight: 500; }
        .subtitle { color: #38bdf8; font-size: 1.15rem; margin: 0 0 16px 0; letter-spacing: 0.5px; }
        .tab-navigation { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 45px; justify-content: flex-start; font-family: 'Fira Code', monospace; }
        .tab-btn { background: rgba(11, 18, 32, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(0, 242, 254, 0.25); color: rgba(226, 232, 240, 0.6); padding: 10px 18px; font-size: 0.8rem; cursor: pointer; border-radius: 6px; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); letter-spacing: 0.5px; }
        .tab-btn.active { color: #00f2fe; border-color: #00f2fe; background: rgba(0, 242, 254, 0.08); font-weight: 500; }
        .tab-panel { position: absolute; left: -9999px; top: 0; width: 100%; box-sizing: border-box; pointer-events: none; }
        .tab-panel.active { position: relative; left: 0; top: 0; pointer-events: auto; }
        .card { background: rgba(11, 18, 32, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(0, 242, 254, 0.2); border-radius: 16px; padding: 30px; margin-bottom: 35px; }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div class="loader-text" id="loader-text">INITIALIZING BIO-OS KERNEL...</div>
        <div class="progress-bar-container"><div id="progress-bar"></div></div>
    </div>

    <div class="bg-video-container">
        <video id="layer-servers" class="bg-video active" autoplay loop muted playsinline><source src="labo.mp4" type="video/mp4"></video>
        <video id="layer-bio" class="bg-video" loop muted playsinline><source src="Macroscopic_journey_through_a.mp4" type="video/mp4"></video>
        <video id="layer-math" class="bg-video" loop muted playsinline><source src="Abstract_geometric_simulation.mp4" type="video/mp4"></video>
    </div>
    <div class="bg-overlay"></div>

    <div class="container">
        <header>
            <div id="sys-status">SYS_STATUS: INITIALIZING SYSTEM TIME...</div>
            <h1>Science 4.0</h1>
            <p class="subtitle">Framework Architectural pour la Résilience et les Systèmes Structurels</p>
            <div class="header-links">
                [ <a href="https://www.linkedin.com/in/julien-boblique-33230a210" target="_blank">LINKEDIN_NODE</a> ] &nbsp;&nbsp; [ <a href="mailto:julien.boblique@orange.fr">CONTACT_PRO</a> ]
            </div>
        </header>

        <nav class="tab-navigation">
            <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">[ MAIN_DASHBOARD ]</button>
            <button class="tab-btn" data-tab="bioos" onclick="switchTab('bioos')">[ BIO-OS_CORE ]</button>
        </nav>

        <main>
            <div id="panel-dashboard" class="tab-panel active">
                <div class="card">
                    <h2>Bienvenue sur Science 4.0</h2>
                    <p>Le système est en cours de déploiement.</p>
                </div>
            </div>
            <div id="panel-bioos" class="tab-panel">
                <div class="card"><h2>Bio-OS Core</h2></div>
            </div>
        </main>
    </div>

    <script>
        // ENGINE 0 : CHARGEMENT DU SYSTEME
        const progressBar = document.getElementById('progress-bar');
        const loaderText = document.getElementById('loader-text');
        let width = 0;
        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                document.getElementById('loader-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loader-overlay').style.display = 'none', 800);
            } else {
                width += 2;
                progressBar.style.width = width + '%';
                if (width > 40) loaderText.innerHTML = "LOADING KERNEL MODULES...";
                if (width > 70) loaderText.innerHTML = "ESTABLISHING NEURAL LINK...";
            }
        }, 40);

        // [AJOUTE ICI TES AUTRES ENGINES DE ROUTAGE ET VIDEO]
        function switchTab(tabId) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`panel-${tabId}`).classList.add('active');
        }
    </script>
</body>
</html>
